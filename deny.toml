# cargo-deny configuration for USG EST Client
# https://embarkstudios.github.io/cargo-deny/

[advisories]
# Use version 2 schema with strict defaults (all advisories denied unless ignored)
version = 2

# The path where the advisory database is cloned/fetched into
db-path = "~/.cargo/advisory-db"
# The url(s) of the advisory databases to use
db-urls = ["https://github.com/rustsec/advisory-db"]

# Known acceptable advisories (with justification)
ignore = [
    # RSA crate timing sidechannel vulnerability (Marvin Attack)
    # Used only for signature verification, not decryption operations
    # Requires network-observable timing measurements, limited impact
    # Action: Monitor for constant-time implementation updates
    { id = "RUSTSEC-2023-0071", reason = "Limited risk: used for signature verification only, not decryption; monitoring for constant-time implementation" },
    # paste crate is unmaintained but is a transitive dependency of cryptoki (PKCS#11)
    # No action needed until cryptoki migrates to an alternative
    { id = "RUSTSEC-2024-0436", reason = "Transitive dep via cryptoki; no alternative available yet" },
]

[licenses]
# Use version 2 schema (all licenses denied unless explicitly allowed)
version = 2

# We allow these licenses for use (all others are denied)
allow = [
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "MIT",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-DFS-2016",
    "Unicode-3.0",  # For unicode/ICU crates (transitive via url/idna)
    "OpenSSL",  # For openssl/openssl-sys (FIPS feature)
    "CDLA-Permissive-2.0",  # For webpki-roots/webpki-root-certs (Mozilla root certificates)
    "MPL-2.0",  # For option-ext (transitive via dirs)
]
# Confidence threshold for license detection (0.0 - 1.0)
confidence-threshold = 0.8

# Some crates don't have their license files included, allow those
[[licenses.clarify]]
name = "ring"
expression = "MIT AND ISC AND OpenSSL"
license-files = [
    { path = "LICENSE", hash = 0xbd0eed23 }
]

[bans]
# Lint level for when multiple versions of the same crate are detected
multiple-versions = "warn"
# Lint level for when a crate version requirement is `*`
wildcards = "warn"

# Allow known duplicate crate versions (transitive dependency version splits)
skip = [
    { crate = "getrandom" },      # 0.2.x / 0.3.x / 0.4.x ecosystem transition
    { crate = "rand" },           # 0.8.x / 0.9.x ecosystem transition
    { crate = "rand_core" },      # 0.6.x / 0.9.x ecosystem transition
    { crate = "rand_chacha" },    # 0.3.x / 0.9.x ecosystem transition
    { crate = "thiserror" },      # 1.x / 2.x via jni -> rustls-platform-verifier
    { crate = "thiserror-impl" }, # mirrors thiserror
    { crate = "winnow" },         # 0.7.x / 1.x via toml parser
]

# Crates that are banned and should not be used
deny = [
    # Insecure crypto implementations
    { crate = "md5", wrappers = [], reason = "Cryptographically broken, use SHA-256+" },
    { crate = "sha1", wrappers = [], reason = "Cryptographically weakened, use SHA-256+" },
]

[sources]
# Lint level for what to happen when a crate from a crate registry that is not
# in the allow list is encountered
unknown-registry = "deny"
# Lint level for what to happen when a crate from a git repository that is not
# in the allow list is encountered
unknown-git = "deny"

# Allow crates from crates.io
allow-registry = ["https://github.com/rust-lang/crates.io-index"]

# List of URLs for allowed Git repositories
allow-git = []
