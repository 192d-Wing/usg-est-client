#
# Splunk saved searches for EST Client monitoring
#

[EST Client - Failed Authentication Attempts]
search = sourcetype="est:client:json" category="authentication" outcome="failure" | stats count by source_host, target_url, auth_method | where count > 5
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
alert.severity = 3
alert.track = 1
alert.expires = 24h
action.email = 1
action.email.to = security-team@example.mil
action.email.subject = EST Client: Multiple Failed Authentication Attempts
action.email.message.alert = Multiple failed authentication attempts detected for EST Client.

[EST Client - Certificate Expired]
search = sourcetype="est:client:json" event_id="CERT-2021"
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
cron_schedule = 0 * * * *
enableSched = 1
alert.severity = 4
alert.track = 1
action.email = 1
action.email.to = security-team@example.mil
action.email.subject = EST Client: Certificate Expired
action.email.message.alert = An EST client certificate has expired and requires immediate attention.

[EST Client - Security Violations]
search = sourcetype="est:client:json" category="security_violation" | table _time, source_host, event_name, severity, details.reason
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = */30 * * * *
enableSched = 1
alert.severity = 5
alert.track = 1
action.email = 1
action.email.to = security-team@example.mil
action.email.subject = EST Client: Security Violation Detected
action.email.message.alert = Security violation detected in EST Client operations.

[EST Client - Daily Certificate Enrollment Summary]
search = sourcetype="est:client:json" (event_id="CERT-2002" OR event_id="CERT-2012") | stats count by event_name, source_host | sort -count
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 8 * * *
enableSched = 1
action.email = 1
action.email.to = operations-team@example.mil
action.email.subject = EST Client: Daily Enrollment Summary
action.email.message.alert = Daily summary of certificate enrollments and renewals.

[EST Client - Certificates Expiring Soon]
search = sourcetype="est:client:json" event_id="CERT-2020" | table _time, source_host, cert_subject, details.days_remaining | sort details.days_remaining
dispatch.earliest_time = -24h@h
dispatch.latest_time = now
cron_schedule = 0 9 * * *
enableSched = 1
action.email = 1
action.email.to = operations-team@example.mil
action.email.subject = EST Client: Certificates Expiring Soon
action.email.message.alert = Certificate expiration notices for upcoming renewals.

[EST Client - Key Generation Failures]
search = sourcetype="est:client:json" category="key_operations" outcome="failure"
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
alert.severity = 4
alert.track = 1
action.email = 1
action.email.to = security-team@example.mil
action.email.subject = EST Client: Key Generation Failure
action.email.message.alert = CNG key generation or operation has failed.

[EST Client - TLS Handshake Failures]
search = sourcetype="est:client:json" event_id="AUTH-1011" | stats count by source_host, target_url, details.error | where count > 3
dispatch.earliest_time = -1h@h
dispatch.latest_time = now
cron_schedule = */15 * * * *
enableSched = 1
alert.severity = 3
alert.track = 1
action.email = 1
action.email.to = network-team@example.mil
action.email.subject = EST Client: TLS Handshake Failures
action.email.message.alert = Multiple TLS handshake failures detected for EST server connections.
