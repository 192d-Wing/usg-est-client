#
# Splunk transforms configuration for EST Client
#

# CEF sourcetype routing
[est_cef_sourcetype]
REGEX = ^CEF:
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::est:client:cef

# CEF field extraction
[est_cef_extraction]
REGEX = ^CEF:(?<cef_version>[^|]*)\|(?<device_vendor>[^|]*)\|(?<device_product>[^|]*)\|(?<device_version>[^|]*)\|(?<signature_id>[^|]*)\|(?<name>[^|]*)\|(?<severity>[^|]*)\|(?<extensions>.*)$
FORMAT = cef_version::$1 device_vendor::$2 device_product::$3 device_version::$4 signature_id::$5 name::$6 severity::$7 extensions::$8

# LEEF sourcetype routing
[est_leef_sourcetype]
REGEX = ^LEEF:
DEST_KEY = MetaData:Sourcetype
FORMAT = sourcetype::est:client:leef

# LEEF field extraction
[est_leef_extraction]
REGEX = ^LEEF:(?<leef_version>[^|]*)\|(?<vendor>[^|]*)\|(?<product>[^|]*)\|(?<version>[^|]*)\|(?<event_id>[^|]*)\|(?<attributes>.*)$
FORMAT = leef_version::$1 vendor::$2 product::$3 version::$4 event_id::$5 attributes::$6
