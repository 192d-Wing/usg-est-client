#
# Splunk props configuration for EST Client logs
#

# JSON format logs
[est:client:json]
DATETIME_CONFIG =
INDEXED_EXTRACTIONS = json
KV_MODE = none
NO_BINARY_CHECK = true
SHOULD_LINEMERGE = false
TIME_PREFIX = \"timestamp\":\s*\"
TIME_FORMAT = %Y-%m-%dT%H:%M:%S.%3NZ
TZ = UTC
MAX_TIMESTAMP_LOOKAHEAD = 32
TRUNCATE = 100000
LINE_BREAKER = ([\r\n]+)
category = Application
pulldown_type = true

# Field extractions
EXTRACT-event_id = \"event_id\":\s*\"(?<event_id>[^\"]+)\"
EXTRACT-event_name = \"event_name\":\s*\"(?<event_name>[^\"]+)\"
EXTRACT-severity = \"severity\":\s*\"(?<severity>[^\"]+)\"
EXTRACT-category = \"category\":\s*\"(?<category>[^\"]+)\"
EXTRACT-outcome = \"outcome\":\s*\"(?<outcome>[^\"]+)\"
EXTRACT-source_host = \"source\":\s*\{[^}]*\"host\":\s*\"(?<source_host>[^\"]+)\"
EXTRACT-source_ip = \"source\":\s*\{[^}]*\"ip\":\s*\"(?<source_ip>[^\"]+)\"
EXTRACT-target_url = \"target\":\s*\{[^}]*\"url\":\s*\"(?<target_url>[^\"]+)\"
EXTRACT-cert_subject = \"certificate\":\s*\{[^}]*\"subject\":\s*\"(?<cert_subject>[^\"]+)\"
EXTRACT-cert_serial = \"certificate\":\s*\{[^}]*\"serial\":\s*\"(?<cert_serial>[^\"]+)\"

# CEF format logs (ArcSight integration)
[est:client:cef]
SHOULD_LINEMERGE = false
TRANSFORMS-sourcetype = est_cef_sourcetype
REPORT-cef = est_cef_extraction
TIME_PREFIX = rt=
TIME_FORMAT = %s%3N
TZ = UTC

# LEEF format logs (QRadar integration)
[est:client:leef]
SHOULD_LINEMERGE = false
TRANSFORMS-sourcetype = est_leef_sourcetype
REPORT-leef = est_leef_extraction
