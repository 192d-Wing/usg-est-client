# Logstash pipeline configuration for EST Client logs
#
# This pipeline ingests EST Client JSON logs and indexes them in Elasticsearch
#
# Usage:
#   sudo cp est-client.conf /etc/logstash/conf.d/
#   sudo systemctl restart logstash

input {
  # File input for JSON logs
  file {
    path => "/var/log/est-client/*.log"
    codec => "json"
    type => "est-client"
    tags => ["est", "certificate", "pki"]
    start_position => "beginning"
    sincedb_path => "/var/lib/logstash/sincedb_est_client"
  }

  # Syslog input for CEF format (ArcSight compatibility)
  syslog {
    port => 5514
    type => "est-client-cef"
    tags => ["est", "cef"]
  }

  # TCP input for LEEF format (QRadar compatibility)
  tcp {
    port => 5515
    codec => line
    type => "est-client-leef"
    tags => ["est", "leef"]
  }
}

filter {
  # Process EST Client JSON logs
  if [type] == "est-client" {
    # Parse timestamp
    date {
      match => [ "timestamp", "ISO8601" ]
      target => "@timestamp"
    }

    # Extract nested fields
    if [source] {
      mutate {
        rename => { "[source][host]" => "source_host" }
        rename => { "[source][ip]" => "source_ip" }
        rename => { "[source][user]" => "source_user" }
        rename => { "[source][process]" => "source_process" }
      }
    }

    if [target] {
      mutate {
        rename => { "[target][url]" => "target_url" }
        rename => { "[target][host]" => "target_host" }
        rename => { "[target][port]" => "target_port" }
      }
    }

    if [certificate] {
      mutate {
        rename => { "[certificate][subject]" => "cert_subject" }
        rename => { "[certificate][issuer]" => "cert_issuer" }
        rename => { "[certificate][serial]" => "cert_serial" }
        rename => { "[certificate][not_before]" => "cert_not_before" }
        rename => { "[certificate][not_after]" => "cert_not_after" }
      }
    }

    # Add severity numeric value for sorting
    if [severity] == "DEBUG" {
      mutate { add_field => { "severity_value" => 10 } }
    } else if [severity] == "INFO" {
      mutate { add_field => { "severity_value" => 20 } }
    } else if [severity] == "WARNING" {
      mutate { add_field => { "severity_value" => 30 } }
    } else if [severity] == "ERROR" {
      mutate { add_field => { "severity_value" => 40 } }
    } else if [severity] == "CRITICAL" {
      mutate { add_field => { "severity_value" => 50 } }
    }

    # Set index name with daily rotation
    mutate {
      add_field => { "[@metadata][index]" => "est-client-%{+YYYY.MM.dd}" }
    }
  }

  # Process CEF format logs
  if [type] == "est-client-cef" {
    grok {
      match => { "message" => "^CEF:%{DATA:cef_version}\|%{DATA:device_vendor}\|%{DATA:device_product}\|%{DATA:device_version}\|%{DATA:signature_id}\|%{DATA:event_name}\|%{DATA:severity}\|%{GREEDYDATA:extensions}$" }
    }

    # Parse CEF extensions
    kv {
      source => "extensions"
      field_split => " "
      value_split => "="
      target => "cef_ext"
    }

    mutate {
      add_field => { "[@metadata][index]" => "est-client-cef-%{+YYYY.MM.dd}" }
    }
  }

  # Process LEEF format logs
  if [type] == "est-client-leef" {
    grok {
      match => { "message" => "^LEEF:%{DATA:leef_version}\|%{DATA:vendor}\|%{DATA:product}\|%{DATA:version}\|%{DATA:event_id}\|%{GREEDYDATA:attributes}$" }
    }

    # Parse LEEF attributes (tab-delimited)
    kv {
      source => "attributes"
      field_split => "\t"
      value_split => "="
      target => "leef_attr"
    }

    mutate {
      add_field => { "[@metadata][index]" => "est-client-leef-%{+YYYY.MM.dd}" }
    }
  }

  # Add GeoIP data for source IPs
  if [source_ip] {
    geoip {
      source => "source_ip"
      target => "geoip"
      add_field => [ "[geoip][coordinates]", "%{[geoip][longitude]}" ]
      add_field => [ "[geoip][coordinates]", "%{[geoip][latitude]}" ]
    }
  }

  # Add tags based on event criticality
  if [category] == "security_violation" or [outcome] == "failure" {
    mutate {
      add_tag => [ "alert", "requires_review" ]
    }
  }

  if [event_id] =~ /^CERT-202[01]$/ {
    # Certificate expired or expiring
    mutate {
      add_tag => [ "certificate_expiration", "requires_action" ]
    }
  }
}

output {
  # Output to Elasticsearch
  elasticsearch {
    hosts => ["localhost:9200"]
    index => "%{[@metadata][index]}"
    document_type => "_doc"

    # Use ILM policy for index lifecycle management
    ilm_enabled => true
    ilm_rollover_alias => "est-client"
    ilm_pattern => "000001"
    ilm_policy => "est-client-policy"
  }

  # Debug output (comment out in production)
  # stdout {
  #   codec => rubydebug
  # }
}
