# ArcSight SmartConnector Configuration for EST Client
#
# This configuration enables ArcSight ESM to receive EST Client security events
# via syslog in CEF (Common Event Format).
#
# Installation:
#   1. Install ArcSight SmartConnector for Syslog
#   2. Copy this file to connector configuration directory
#   3. Configure EST Client to forward to syslog with CEF format
#   4. Restart SmartConnector

# Connector Information
connector.name=EST Client PKI Connector
connector.type=syslog
connector.version=1.0.0

# Syslog Configuration
syslog.protocol=tcp
syslog.port=514
syslog.host=0.0.0.0
syslog.format=cef

# Parser Configuration
parser.type=cef
parser.vendor=U.S. Government
parser.product=EST Client
parser.version=1.0

# Event Categorization
categorization.enabled=true
categorization.behavior.model=est-client

# Field Mappings
# Map CEF fields to ArcSight Common Event Format (CEF) standard fields

# Device fields
map.deviceVendor=U.S. Government
map.deviceProduct=EST Client
map.deviceVersion=1.0

# Source fields
map.sourceAddress=src
map.sourceHostName=shost
map.sourceUserName=suser
map.sourceProcessName=sproc

# Destination fields
map.destinationAddress=dst
map.destinationHostName=dhost
map.destinationPort=dport

# Event fields
map.categoryObject=cat
map.categoryBehavior=act
map.categoryOutcome=outcome
map.categorySignificance=sev

# Certificate fields (custom strings)
map.deviceCustomString1=cs1
map.deviceCustomString1Label=Certificate Subject
map.deviceCustomString2=cs2
map.deviceCustomString2Label=Certificate Issuer
map.deviceCustomString3=cs3
map.deviceCustomString3Label=Certificate Serial
map.deviceCustomString4=cs4
map.deviceCustomString4Label=Certificate Thumbprint

# Key operation fields
map.deviceCustomString5=cs5
map.deviceCustomString5Label=Key Algorithm
map.deviceCustomNumber1=cn1
map.deviceCustomNumber1Label=Key Size

# Priority Mapping
# Map EST event severity to ArcSight priority
priority.CRITICAL=10
priority.HIGH=8
priority.MEDIUM=6
priority.LOW=3

# Event Type Categorization
# Authentication Events (AUTH-*)
eventType.AUTH-1001=/Authentication/Verify
eventType.AUTH-1002=/Authentication/Failed
eventType.AUTH-1003=/Authentication/Lockout
eventType.AUTH-1010=/Session/Start
eventType.AUTH-1011=/Session/Failed

# Certificate Events (CERT-*)
eventType.CERT-2001=/Certificate/Request
eventType.CERT-2002=/Certificate/Issue
eventType.CERT-2003=/Certificate/Failure
eventType.CERT-2011=/Certificate/Renew
eventType.CERT-2012=/Certificate/Renewed
eventType.CERT-2013=/Certificate/RenewFailed
eventType.CERT-2020=/Certificate/Expiring
eventType.CERT-2021=/Certificate/Expired

# Key Operation Events (KEY-*)
eventType.KEY-3001=/Cryptography/KeyGeneration
eventType.KEY-3002=/Cryptography/KeyGenerationFailure
eventType.KEY-3010=/Cryptography/Signing
eventType.KEY-3011=/Cryptography/SigningFailure

# Security Violation Events (SEC-*)
eventType.SEC-9001=/Security/Violation
eventType.SEC-9002=/Security/PolicyViolation
eventType.SEC-9003=/Security/IntegrityViolation

# Correlation Rules
# Enable correlation based on authentication failures
correlation.auth.failures.enabled=true
correlation.auth.failures.threshold=5
correlation.auth.failures.window=300
correlation.auth.failures.action=alert

# Enable correlation for certificate expiration
correlation.cert.expiring.enabled=true
correlation.cert.expiring.threshold_days=30
correlation.cert.expiring.action=notify

# Filtering
# Filter out debug-level events (optional)
filter.severity.exclude=DEBUG

# Normalization
normalize.timestamps=true
normalize.timezone=UTC

# Buffering and Performance
buffer.size=10000
buffer.flush.interval=30
threads.worker=4

# TLS Configuration (for secure syslog)
tls.enabled=false
tls.cert.path=/path/to/connector.crt
tls.key.path=/path/to/connector.key
tls.ca.path=/path/to/ca.crt

# ArcSight ESM Manager Connection
manager.host=arcsight-esm.example.mil
manager.port=8443
manager.username=connector_user
manager.password.encrypted=true

# Logging
log.level=INFO
log.file=/var/log/arcsight/est-client-connector.log
log.rotation.size=100MB
log.rotation.count=10

# Health Monitoring
health.check.enabled=true
health.check.interval=300
health.check.timeout=30
