name: Release Build

on:
  push:
    tags:
      - 'v*.*.*'
      - 'v*.*.*-*'

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  create-release:
    name: Create Release
    runs-on: ubuntu-latest
    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}
      version: ${{ steps.get_version.outputs.version }}
    steps:
      - name: Get version from tag
        id: get_version
        run: echo "version=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tag_name: ${{ github.ref }}
          release_name: Release ${{ github.ref }}
          draft: false
          prerelease: ${{ contains(github.ref, '-alpha') || contains(github.ref, '-beta') || contains(github.ref, '-rc') }}
          body: |
            ## EST Client Release ${{ steps.get_version.outputs.version }}

            ### Downloads

            Choose the appropriate binary for your platform:

            - **Windows**: `est-enroll-${{ steps.get_version.outputs.version }}-x86_64-pc-windows-msvc.exe`
            - **Linux**: `est-enroll-${{ steps.get_version.outputs.version }}-x86_64-unknown-linux-gnu`
            - **macOS (Intel)**: `est-enroll-${{ steps.get_version.outputs.version }}-x86_64-apple-darwin`
            - **macOS (Apple Silicon)**: `est-enroll-${{ steps.get_version.outputs.version }}-aarch64-apple-darwin`

            ### Installation

            ```bash
            # Linux/macOS
            chmod +x est-enroll-*
            sudo mv est-enroll-* /usr/local/bin/est-enroll

            # Windows
            # Place the .exe file in a directory on your PATH
            ```

            ### Checksums

            See the `checksums.txt` file for SHA256 checksums of all binaries.

            ### Documentation

            - [Configuration Guide](https://github.com/johnwillman/usg-est-client/blob/main/CONFIGURATION.md)
            - [Security Documentation](https://github.com/johnwillman/usg-est-client/blob/main/docs/INSECURE-FLAG-SECURITY.md)
            - [Examples](https://github.com/johnwillman/usg-est-client/tree/main/examples)

  build-release:
    name: Build Release - ${{ matrix.target }}
    needs: create-release
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          # Linux
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            use-cross: false

          # macOS Intel
          - os: macos-latest
            target: x86_64-apple-darwin
            use-cross: false

          # macOS Apple Silicon
          - os: macos-latest
            target: aarch64-apple-darwin
            use-cross: false

          # Windows
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use-cross: false

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: ~/.cargo/registry
          key: ${{ runner.os }}-cargo-registry-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-registry-

      - name: Cache cargo index
        uses: actions/cache@v4
        with:
          path: ~/.cargo/git
          key: ${{ runner.os }}-cargo-git-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-git-

      - name: Cache target directory
        uses: actions/cache@v4
        with:
          path: target
          key: ${{ runner.os }}-${{ matrix.target }}-target-release-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.target }}-target-release-

      - name: Install dependencies (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin est-enroll --features cli

      - name: Prepare binary (Unix)
        if: matrix.os != 'windows-latest'
        run: |
          cd target/${{ matrix.target }}/release
          BINARY_NAME="est-enroll-${{ needs.create-release.outputs.version }}-${{ matrix.target }}"
          mv est-enroll "$BINARY_NAME"
          shasum -a 256 "$BINARY_NAME" > "$BINARY_NAME.sha256"
          tar -czf "$BINARY_NAME.tar.gz" "$BINARY_NAME"
          echo "ASSET_PATH=target/${{ matrix.target }}/release/$BINARY_NAME.tar.gz" >> $GITHUB_ENV
          echo "ASSET_NAME=$BINARY_NAME.tar.gz" >> $GITHUB_ENV
          echo "CHECKSUM_PATH=target/${{ matrix.target }}/release/$BINARY_NAME.sha256" >> $GITHUB_ENV

      - name: Prepare binary (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: |
          cd target/${{ matrix.target }}/release
          $BINARY_NAME = "est-enroll-${{ needs.create-release.outputs.version }}-${{ matrix.target }}.exe"
          Move-Item est-enroll.exe $BINARY_NAME
          $hash = (Get-FileHash -Algorithm SHA256 $BINARY_NAME).Hash.ToLower()
          "$hash  $BINARY_NAME" | Out-File -Encoding ASCII "$BINARY_NAME.sha256"
          Compress-Archive -Path $BINARY_NAME -DestinationPath "$BINARY_NAME.zip"
          echo "ASSET_PATH=target/${{ matrix.target }}/release/$BINARY_NAME.zip" >> $env:GITHUB_ENV
          echo "ASSET_NAME=$BINARY_NAME.zip" >> $env:GITHUB_ENV
          echo "CHECKSUM_PATH=target/${{ matrix.target }}/release/$BINARY_NAME.sha256" >> $env:GITHUB_ENV

      - name: Upload release binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ env.ASSET_PATH }}
          asset_name: ${{ env.ASSET_NAME }}
          asset_content_type: application/octet-stream

      - name: Upload checksum
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ env.CHECKSUM_PATH }}
          asset_name: ${{ matrix.target }}.sha256
          asset_content_type: text/plain

  build-additional-binaries:
    name: Build Additional Binaries - ${{ matrix.binary }}
    needs: create-release
    runs-on: ubuntu-latest
    strategy:
      matrix:
        binary:
          - est-autoenroll-service
          - est-service-install
          - est-migrate-keys
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libssl-dev

      - name: Build binary
        run: cargo build --release --bin ${{ matrix.binary }} --features cli

      - name: Prepare binary
        run: |
          cd target/release
          BINARY_NAME="${{ matrix.binary }}-${{ needs.create-release.outputs.version }}-x86_64-unknown-linux-gnu"
          mv ${{ matrix.binary }} "$BINARY_NAME"
          shasum -a 256 "$BINARY_NAME" > "$BINARY_NAME.sha256"
          tar -czf "$BINARY_NAME.tar.gz" "$BINARY_NAME"
          echo "ASSET_PATH=target/release/$BINARY_NAME.tar.gz" >> $GITHUB_ENV
          echo "ASSET_NAME=$BINARY_NAME.tar.gz" >> $GITHUB_ENV

      - name: Upload binary
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: ${{ env.ASSET_PATH }}
          asset_name: ${{ env.ASSET_NAME }}
          asset_content_type: application/octet-stream

  generate-checksums:
    name: Generate Checksums File
    needs: [create-release, build-release]
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const release = await github.rest.repos.getReleaseByTag({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag: context.ref.replace('refs/tags/', '')
            });

            const assets = release.data.assets;
            let checksums = '# SHA256 Checksums\n\n';

            for (const asset of assets) {
              if (asset.name.endsWith('.sha256')) {
                const download = await github.rest.repos.getReleaseAsset({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  asset_id: asset.id,
                  headers: {
                    accept: 'application/octet-stream'
                  }
                });
                checksums += Buffer.from(download.data).toString('utf8') + '\n';
              }
            }

            fs.writeFileSync('checksums.txt', checksums);

      - name: Upload checksums file
        uses: actions/upload-release-asset@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          upload_url: ${{ needs.create-release.outputs.upload_url }}
          asset_path: checksums.txt
          asset_name: checksums.txt
          asset_content_type: text/plain
