name: Release

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+*"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
          - target: x86_64-apple-darwin
            os: macos-latest
          - target: aarch64-apple-darwin
            os: macos-latest
          - target: x86_64-pc-windows-msvc
            os: windows-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get install -y musl-tools

      - name: Build release binary
        run: cargo build --release --target ${{ matrix.target }} --bin est-enroll --features cli

      - name: Package (Unix)
        if: "!contains(matrix.target, 'windows')"
        run: |
          VERSION=${GITHUB_REF_NAME#v}
          BINARY_NAME="est-enroll-${VERSION}-${{ matrix.target }}"
          cp "target/${{ matrix.target }}/release/est-enroll" "$BINARY_NAME"
          sha256sum "$BINARY_NAME" > "$BINARY_NAME.sha256"
          tar -czf "$BINARY_NAME.tar.gz" "$BINARY_NAME"

      - name: Package (Windows)
        if: contains(matrix.target, 'windows')
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME -replace '^v', ''
          $BINARY_NAME = "est-enroll-$VERSION-${{ matrix.target }}.exe"
          Copy-Item "target/${{ matrix.target }}/release/est-enroll.exe" $BINARY_NAME
          $hash = (Get-FileHash -Algorithm SHA256 $BINARY_NAME).Hash.ToLower()
          "$hash  $BINARY_NAME" | Out-File -Encoding ASCII "$BINARY_NAME.sha256"
          Compress-Archive -Path $BINARY_NAME -DestinationPath "$BINARY_NAME.zip"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: release-${{ matrix.target }}
          path: |
            *.tar.gz
            *.zip
            *.sha256

  publish:
    name: Create GitHub Release
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/download-artifact@v8
        with:
          path: artifacts
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd artifacts 2>/dev/null || true
          echo "# SHA256 Checksums for ${GITHUB_REF_NAME}" > checksums.txt
          echo "" >> checksums.txt
          cat *.sha256 >> checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            artifacts/*.tar.gz
            artifacts/*.zip
            artifacts/*.sha256
            artifacts/checksums.txt
