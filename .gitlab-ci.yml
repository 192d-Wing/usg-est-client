# ============================================================================
# Lint Jobs
# ============================================================================

clippy:default:
  stage: lint
  image: rust:latest
  <<: *cargo_cache
  before_script:
    - rustup component add clippy
  script:
    - cargo clippy -- -D warnings
  only:
    - main
    - merge_requests

clippy:all-features:
  stage: lint
  image: rust:latest
  <<: *cargo_cache
  before_script:
    - rustup component add clippy
  script:
    - cargo clippy --all-features -- -D warnings
  only:
    - main
    - merge_requests

rustfmt:
  stage: lint
  image: rust:latest
  before_script:
    - rustup component add rustfmt
  script:
    - cargo fmt --all -- --check
  only:
    - main
    - merge_requests

docs:
  stage: lint
  image: rust:latest
  <<: *cargo_cache
  script:
    - cargo doc --all-features --no-deps
  variables:
    RUSTDOCFLAGS: "-D warnings"
  only:
    - main
    - merge_requests

# ============================================================================
# Security Jobs
# ============================================================================

security:cargo-audit:
  stage: security
  image: rust:latest
  script:
    - cargo install cargo-audit --locked
    - cargo audit --json | tee audit-report.json
  artifacts:
    name: "security-audit-report-$CI_COMMIT_REF_NAME"
    paths:
      - audit-report.json
    expire_in: 30 days
    when: always
  only:
    - main
    - merge_requests
    - schedules

security:cargo-deny:advisories:
  stage: security
  image: rust:latest
  before_script:
    - apt-get update && apt-get install -y wget
    - wget https://github.com/EmbarkStudios/cargo-deny/releases/download/0.14.24/cargo-deny-0.14.24-x86_64-unknown-linux-musl.tar.gz
    - tar -xzf cargo-deny-0.14.24-x86_64-unknown-linux-musl.tar.gz
    - mv cargo-deny /usr/local/bin/
  script:
    - cargo deny check advisories
  only:
    - main
    - merge_requests

security:cargo-deny:licenses:
  stage: security
  image: rust:latest
  before_script:
    - apt-get update && apt-get install -y wget
    - wget https://github.com/EmbarkStudios/cargo-deny/releases/download/0.14.24/cargo-deny-0.14.24-x86_64-unknown-linux-musl.tar.gz
    - tar -xzf cargo-deny-0.14.24-x86_64-unknown-linux-musl.tar.gz
    - mv cargo-deny /usr/local/bin/
  script:
    - cargo deny check licenses
  only:
    - main
    - merge_requests

security:cargo-deny:bans:
  stage: security
  image: rust:latest
  before_script:
    - apt-get update && apt-get install -y wget
    - wget https://github.com/EmbarkStudios/cargo-deny/releases/download/0.14.24/cargo-deny-0.14.24-x86_64-unknown-linux-musl.tar.gz
    - tar -xzf cargo-deny-0.14.24-x86_64-unknown-linux-musl.tar.gz
    - mv cargo-deny /usr/local/bin/
  script:
    - cargo deny check bans
  only:
    - main
    - merge_requests

security:cargo-deny:sources:
  stage: security
  image: rust:latest
  before_script:
    - apt-get update && apt-get install -y wget
    - wget https://github.com/EmbarkStudios/cargo-deny/releases/download/0.14.24/cargo-deny-0.14.24-x86_64-unknown-linux-musl.tar.gz
    - tar -xzf cargo-deny-0.14.24-x86_64-unknown-linux-musl.tar.gz
    - mv cargo-deny /usr/local/bin/
  script:
    - cargo deny check sources
  only:
    - main
    - merge_requests

security:clippy:
  stage: security
  image: rust:latest
  <<: *cargo_cache
  before_script:
    - rustup component add clippy
  script:
    - |
      cargo clippy --all-targets --all-features -- \
        -D warnings \
        -W clippy::unwrap_used \
        -W clippy::expect_used \
        -W clippy::panic \
        -W clippy::todo \
        -W clippy::unimplemented \
        -W clippy::unreachable
  only:
    - main
    - merge_requests

security:test-features:
  stage: security
  image: rust:latest
  <<: *cargo_cache
  script:
    - cargo test --all-features
    - cargo test --features validation
    - cargo check --features fips
    - cargo check --features dod
  only:
    - main
    - merge_requests

# ============================================================================
# Coverage Job
# ============================================================================

coverage:tarpaulin:
  stage: coverage
  image: rust:latest
  <<: *cargo_cache
  script:
    - cargo install cargo-tarpaulin
    - cargo tarpaulin --all-features --out Xml --output-dir coverage
  artifacts:
    name: "coverage-report-$CI_COMMIT_REF_NAME"
    paths:
      - coverage/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: coverage/cobertura.xml
    expire_in: 30 days
  only:
    - main
    - merge_requests

# ============================================================================
# Documentation Build (GitLab Pages)
# ============================================================================

# GitLab Pages deployment - builds and deploys documentation site
# Equivalent to GitHub Actions docs.yml workflow
# Site will be available at: https://<namespace>.gitlab.io/<project>/
pages:
  stage: docs
  image: python:3.14-slim
  before_script:
    # Install uv package manager (fast Python installer)
    - pip install --no-cache-dir uv
  script:
    # Build documentation site with Zensical
    - cd docs
    - uv sync
    - uv run zensical build --clean
    # GitLab Pages requires artifacts in 'public' directory at project root
    - mv site ../public
  artifacts:
    paths:
      - public
    expire_in: 1 week
  rules:
    # Only run when docs change or on main branch pushes
    - if: '$CI_COMMIT_BRANCH == "main"'
      changes:
        - docs/**/*
        - .gitlab-ci.yml
      when: always
    # Allow manual trigger for main branch
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: manual
      allow_failure: true

# ============================================================================
# Scheduled Jobs
# ============================================================================

# Daily security audit (configure in GitLab: CI/CD > Schedules)
# Set schedule to run at 00:00 UTC daily with variable: SCHEDULED_JOB=security
security:scheduled:
  stage: security
  image: rust:latest
  script:
    - cargo install cargo-audit --locked
    - cargo audit --json | tee audit-report-scheduled.json
  artifacts:
    name: "security-audit-scheduled-$CI_COMMIT_REF_NAME-$CI_PIPELINE_ID"
    paths:
      - audit-report-scheduled.json
    expire_in: 90 days
  rules:
    - if: '$SCHEDULED_JOB == "security"'
