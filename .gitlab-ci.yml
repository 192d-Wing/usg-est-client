# ============================================================================

test:stable:linux:
  stage: test
  image: rust:latest
  <<: *cargo_cache
  script:
    - cargo test --verbose
    - cargo test --all-features --verbose
    - cargo test --no-default-features --verbose
  only:
    - main
    - merge_requests

